<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.O.S.T. - Industrial Stock</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-slate-300">

    <header class="flex items-center justify-between px-6 bg-slate-900 border-b border-white/5">
        <div class="flex items-center gap-3">
            <img src="assets/logo.png" alt="K.O.S.T Logo" class="w-9 h-9 rounded-md object-cover shadow-[0_0_15px_rgba(34,197,94,0.3)] shrink-0 border border-[#22C55E]/30">
            <h1 class="text-white font-extrabold text-xl tracking-tighter">
                <span class="text-blue-500">K</span>.<span class="text-red-600">O</span>.S.T.
            </h1>
        </div>
        
        <div class="flex items-center gap-2 sm:gap-6">
            <!-- Clock: hidden on mobile, shown from sm -->
            <div id="clock-container" class="flex items-center gap-4 bg-black/40 border border-white/5 px-4 py-2 rounded-sm border-l-4 border-l-[#22C55E]">
                <div class="flex flex-col">
                    <div class="flex items-baseline gap-1 leading-none">
                        <span id="current-time" class="text-2xl font-black text-white tracking-tighter tabular-nums">00:00</span>
                        <span id="current-seconds" class="text-[10px] font-black text-[#22C55E] tabular-nums opacity-80">00</span>
                        <img src="https://media1.giphy.com/media/PFxFYEZNUavG8/giphy.gif" alt="Animation" class="header-sticker ml-2">
                    </div>
                    <div id="current-date" class="text-[8px] font-black text-slate-500 uppercase tracking-[0.2em] mt-1">-- --- ----</div>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <a href="https://docs.google.com/spreadsheets/d/1j-ZGGNNaFKOslb_kkmqZCTSMlKzR8k7xmVhGs9kTBqs/edit?usp=sharing" target="_blank" class="rainbow-btn px-3 sm:px-5 py-2 text-xs font-black uppercase flex items-center gap-1.5 transition-transform hover:scale-105 active:scale-95">
                    <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5 text-white shrink-0"></i>
                    <span class="hidden sm:inline">Cloud (Excel)</span>
                    <span class="sm:hidden">Cloud</span>
                </a>
                <button id="btn-clear-cache" title="Vider le cache local" class="hidden sm:flex bg-red-900/20 hover:bg-red-900/40 text-red-400 px-3 py-1.5 text-[10px] font-bold transition-all border border-red-900/30 uppercase items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                    Vider le cache
                </button>
                <div class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest hidden lg:block" id="db-status">SUPABASE: CONNECTED</div>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main>
        <!-- Left: Input Controls -->
        <aside class="sidebar">
            <div class="space-y-4">
                <h2 class="text-xs font-black text-[#22C55E] border-l-4 border-[#22C55E] pl-3 py-1">ENTRY MODULE</h2>
                
                <form id="stock-form" class="space-y-4">
                    <!-- Mobile: location small, barcode wide -->
                    <div class="flex gap-3 sm:block sm:space-y-5">
                        <div class="input-group w-24 sm:w-full">
                            <label for="emplacement">Loc.</label>
                            <input type="text" id="emplacement" name="emplacement" required placeholder="---" autocomplete="off" style="min-height:44px">
                        </div>

                        <div class="input-group flex-1">
                            <label for="barcode">Barcode / Scan</label>
                            <input type="text" id="barcode" name="barcode" required placeholder="WAITING..." autocomplete="off" inputmode="numeric" style="min-height:44px">
                        </div>
                    </div>

                    <button type="button" id="btn-open-search" class="btn-search w-full" style="min-height:44px">
                        <i data-lucide="zoom-in" class="w-4 h-4 text-[#22C55E]"></i>
                        ADVANCED SEARCH
                    </button>
                </form>
            </div>

            <!-- Stats: horizontal on mobile, grid on desktop -->
            <div class="border-t border-slate-800 pt-4 flex gap-2 sm:grid sm:grid-cols-2">
                <div class="bg-black/40 p-2 sm:p-3 border border-slate-800 flex-1">
                    <p class="text-[10px] font-bold text-slate-500 mb-0.5">TOTAL</p>
                    <p class="text-lg sm:text-xl font-bold text-white" id="item-count">0</p>
                </div>
                <div class="bg-black/40 p-2 sm:p-3 border border-slate-800 flex-1">
                    <p class="text-[10px] font-bold text-slate-500 mb-0.5">PENDING</p>
                    <p class="text-lg sm:text-xl font-bold text-[#22C55E]" id="stat-pending">0</p>
                </div>
                <div class="bg-black/40 p-2 sm:p-3 border border-slate-800 flex-1 sm:col-span-2">
                    <p class="text-[10px] font-bold text-slate-500 mb-0.5">VALIDATED</p>
                    <p class="text-lg sm:text-xl font-bold text-white" id="stat-validated">0</p>
                </div>
            </div>

            <div class="hidden sm:block text-[9px] uppercase font-bold tracking-[0.3em] text-center opacity-80">
                <span class="rainbow-text">codé par Sayah Anis</span>
            </div>
        </aside>

        <!-- Right: Real-time Monitor -->
        <section class="content-area">
            <div class="flex items-center justify-between px-6 py-3 border-b border-slate-900 bg-black/20">
                <h3 class="text-[10px] font-bold tracking-widest text-slate-400">INVENTORY STREAM</h3>
                <span class="text-[9px] bg-cyan-500/10 text-cyan-400 px-2 py-0.5 border border-cyan-500/20 font-bold uppercase tracking-widest">LIVE DATA</span>
            </div>

            <div class="scrollable-table">
                <table>
                    <thead>
                        <tr>
                            <th>Emplacement</th>
                            <th>Barcode ID</th>
                            <th>Status</th>
                            <th class="text-right">Op.</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list">
                        <tr id="empty-state">
                            <td colspan="4" class="text-center py-20 opacity-20">
                                <i data-lucide="database-backup" class="w-12 h-12 mx-auto mb-4"></i>
                                <p class="text-xs uppercase font-bold tracking-widest">Awaiting scanner input...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Fixed Action Footer -->
    <footer class="gap-4">
        <button id="btn-refresh" class="btn-refresh">
            <i data-lucide="refresh-cw" class="w-6 h-6"></i>
            ACTUALISER
        </button>
        <button id="btn-cloud" class="btn-validate">
            <i data-lucide="cloud-upload" class="w-6 h-6"></i>
            VALIDATE & SYNCHRONIZE CLOUD
        </button>
    </footer>

    <!-- Search Modal -->
    <div id="search-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div id="modal-content" class="bg-[#171717] w-full max-w-md border border-[#22C55E]/20 p-8 shadow-2xl relative">
            <button id="btn-close-modal" class="absolute top-4 right-4 text-slate-500 hover:text-white">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h3 class="text-lg font-bold text-white mb-6 border-b border-slate-800 pb-4 flex justify-between items-center">
                <span>ARTICLE LOOKUP</span>
                <span id="search-loader" class="text-[10px] text-cyan-400 animate-pulse hidden">RECHERCHE EN COURS...</span>
            </h3>
            <form id="modal-search-form" class="space-y-5">
                <div class="input-group">
                    <label>Reference (5 caractères)</label>
                    <input type="text" id="modal-ref" required class="w-full" maxlength="5">
                </div>
                
                <div id="color-group" class="input-group hidden">
                    <label>Color</label>
                    <select id="modal-color" class="w-full bg-[#000000] border border-[#333333] text-white p-4 font-['Space_Grotesk'] text-base focus:border-[#22D3EE] focus:outline-none transition-colors">
                        <option value="">Choisir une couleur...</option>
                    </select>
                </div>
                
                <div id="size-group" class="input-group hidden">
                    <label>Size</label>
                    <select id="modal-size" class="w-full bg-[#000000] border border-[#333333] text-white p-4 font-['Space_Grotesk'] text-base focus:border-[#22D3EE] focus:outline-none transition-colors">
                        <option value="">Choisir une taille...</option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div id="edit-modal-content" class="bg-[#171717] w-full max-w-md border border-cyan-400/20 p-8 shadow-2xl relative transition-all duration-300 scale-95 opacity-0">
            <button id="btn-close-edit" class="absolute top-4 right-4 text-slate-500 hover:text-white">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h3 class="text-lg font-bold text-white mb-6 border-b border-slate-800 pb-4 flex items-center gap-2">
                <i data-lucide="edit" class="w-5 h-5 text-cyan-400"></i> EDIT ITEM
            </h3>
            <form id="modal-edit-form" class="space-y-5">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="edit-uuid">
                <div class="input-group">
                    <label>Emplacement</label>
                    <input type="text" id="edit-emplacement" required class="w-full">
                </div>
                <div class="input-group">
                    <label>Code-barre</label>
                    <input type="text" id="edit-barcode" required class="w-full font-mono">
                </div>
                <button type="submit" id="btn-save-edit" class="btn-validate mt-4 h-14 text-sm w-full bg-cyan-500 hover:bg-cyan-600 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)]">
                    SAUVEGARDER
                </button>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="app.js" defer></script>
</body>
</html>
